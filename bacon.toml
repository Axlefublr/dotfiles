# [[sort on]]
default_job = 'clippy'
on_change_strategy = 'kill_then_restart'
# [[sort off]]

[keybindings]
# [[sort on]]
'?' = 'no-op'
0 = 'show-item(10)'
1 = 'show-item(1)'
2 = 'show-item(2)'
3 = 'show-item(3)'
4 = 'show-item(4)'
5 = 'show-item(5)'
6 = 'show-item(6)'
7 = 'show-item(7)'
8 = 'show-item(8)'
9 = 'show-item(9)'
F1 = 'help'
F5 = 'no-op'
a = 'no-op'
alt-i = 'no-op'
alt-space = 'quit'
alt-t = 'no-op'
alt-u = 'no-op'
backtab = 'no-op'
c = 'job:clippy'
ctrl-c = 'no-op'
ctrl-d = 'no-op'
ctrl-end = 'scroll-to-bottom'
ctrl-home = 'scroll-to-top'
ctrl-j = 'no-op'
ctrl-q = 'no-op'
ctrl-r = 'refresh'
end = 'no-op'
esc = 'back'
f = 'toggle-pause'
h = 'no-op'
home = 'no-op'
i = 'no-op'
j = 'scroll-lines(1)'
k = 'scroll-lines(-1)'
n = 'next-match'
p = 'no-op'
pagedown = 'scroll-pages(0.5)'
pageup = 'scroll-pages(-0.5)'
r = 'job:run'
s = 'copy-unstyled-output'
shift-j = 'open-jobs-menu'
shift-n = 'previous-match'
shift-r = 'toggle-raw-output'
shift-t = 'scope-to-failures'
shift-tab = 'no-op'
shift-w = 'toggle-wrap'
space = 'no-op'
t = 'job:test'
tab = 'no-op'
u = 'toggle-summary'
w = 'no-op'
# [[sort off]]
