theme = "gruvbox_material"

[editor]
auto-completion = true
auto-format = true
auto-info = true
bufferline = "always"
color-modes = true
completion-timeout = 5
completion-trigger-len = 2
continue-comments = false
default-line-ending = "lf"
default-yank-register = "+"
insecure = true
insert-final-newline = true
jump-label-alphabet = "jfkdlsaeiwoxcmghruvnzbqpty"
line-number = "relative"
preview-completion-insert = false
scrolloff = 99
shell = [
    "dash",
    "-c",
]
text-width = 110
trim-final-newlines = true
trim-trailing-whitespace = true
enable-diagnostics = true
whichkey = false
ripgrep = true

[editor.auto-save]
focus-lost = false

[editor.buffer-picker]
start-position = "previous"

[editor.cursor-shape]
insert = "bar"

[editor.file-picker]
hidden = false

[editor.gutters]
layout = []

[editor.gutters.line-numbers]
min-width = 2

[editor.search]
wrap-around = true
max-matches = "none"

[editor.lsp]
auto-signature-help = false
display-inlay-hints = false
display-messages = true
display-signature-help-docs = true
goto-reference-include-declaration = false
snippets = true

[editor.soft-wrap]
enable = true
max-wrap = 0
wrap-indicator = ""

[editor.whitespace.characters]
newline = "↪"
space = "·"
nbsp = "⍽"
nnbsp = "␣"
tab = "➜"
tabpad = " "

[editor.auto-pairs]
"<" = ">"
"(" = ")"
"{" = "}"
"[" = "]"
'"' = '"'
"'" = "'"
"`" = "`"
"«" = "»"
"‘" = "’"
"“" = "”"

[editor.inline-diagnostics]
cursor-line = "info"
other-lines = "info"
max-wrap = 0

[editor.word-completion]
enable = true
trigger-length = 4

[editor.smart-tab]
enable = false
supersede-menu = true

[editor.auto-reload]
enable = true

[editor.auto-reload.poll]
interval = 1000

[editor.picker]
scrolloff = 99

[editor.shellmap]
"€" = [
    "nu",
    "--no-std-lib",
    "--stdin",
    "--config",
    "~/fes/dot/nu/lvoc/crooked.nu",
    "-c",
]
"°" = [
    "fish",
    "-c",
]
"∞" = [
    "calc",
    "-t",
]
"√" = [
    "julia",
    "-E",
]

[editor.harp]
command = "filetype"
search = "buffer"
register = "filetype"
mark = "buffer"
file = "directory"

[editor.harp.hotkeys]
global = "l"
directory = "k"
filetype = ";"
buffer = "j"
switch = "'"
delete = "<del>"
delete-all = "<S-del>"
alt = "/"

[editor.statusline]
left = [
    "primary-selection-length",
    "spacer",
    "selections",
    "spacer",
    "smart-path",
]
center = ["read-only-indicator"]
right = [
    "spinner",
    "spacer",
    "register",
    "diagnostics",
    "search-position",
    "file-type",
    "position",
    "total-line-numbers",
    "spacer",
    "position-percentage",
    "file-encoding",
]

